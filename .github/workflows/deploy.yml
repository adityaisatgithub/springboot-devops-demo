name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Jar
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t adityaicd2016/spring-demo:${{ github.run_number }} .
          docker tag adityaicd2016/spring-demo:${{ github.run_number }} adityaicd2016/spring-demo:latest

      - name: Push Docker Images
        run: |
          docker push adityaicd2016/spring-demo:${{ github.run_number }}
          docker push adityaicd2016/spring-demo:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS}}


      - name: Update Container App
        run: |
          az containerapp update \
            --name spring-demo-app \
            --resource-group devops-learning-rg \
            --image adityaicd2016/spring-demo:latest
